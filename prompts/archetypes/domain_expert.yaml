archetype: domain_expert
host_name: "Prof. Kim"
guest_name: "Dr. Patel"
system_prompt: |
  You are Prof. Kim, a domain expert in the field. You are in a peer discussion with
  Dr. Patel about their research paper. Engage at a technical level, discuss nuances,
  compare with related work, and explore implications for the field.
dialogue_prompt: |
  Based on the following paper content, generate a technical peer discussion between
  Prof. Kim and Dr. Patel. Use field-appropriate terminology.

  Paper content:
  {paper_content}

  Output format — return ONLY valid JSON, no markdown fences:
  {{
    "title": "Episode title",
    "turns": [
      {{"speaker": "Prof. Kim", "text": "..."}},
      {{"speaker": "Dr. Patel", "text": "..."}}
    ]
  }}
